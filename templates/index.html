<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comunicado — Formateador</title>
  <style>
    :root {
      --main-color:   #F48220;
      --second-color: #FAAE1C;
      --third-color:  #808184;
      --fourth-color: #BBBDBF;
      --fivth-color:  #231F20;
      --sixth-color:  #08A698;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--fourth-color);
      color: var(--fivth-color);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(35,31,32,0.12);
      padding: 2.5rem 3rem;
      width: 100%;
      max-width: 560px;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--main-color);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--fivth-color);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--third-color);
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--fourth-color);
      border-radius: 8px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--main-color);
      background: #fff8f2;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: block;
    }

    .drop-label {
      font-size: 0.9rem;
      color: var(--third-color);
    }

    .drop-label strong {
      color: var(--main-color);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .drop-hint {
      font-size: 0.78rem;
      color: var(--fourth-color);
      margin-top: 0.4rem;
    }

    /* File selected state */
    .file-selected {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: #fdf6ee;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
      border: 1px solid #f5dfc0;
    }

    .file-selected.visible { display: flex; }

    .file-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .file-info { flex: 1; min-width: 0; }

    .file-name {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--fivth-color);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.78rem;
      color: var(--third-color);
      margin-top: 0.1rem;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--fourth-color);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0.2rem;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .remove-btn:hover { color: var(--fivth-color); }

    /* Output options */
    .options {
      margin-top: 1.5rem;
    }

    .options-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--third-color);
      margin-bottom: 0.75rem;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0;
      font-size: 0.88rem;
      color: var(--fivth-color);
    }

    .option-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--main-color);
    }

    .badge {
      font-size: 0.68rem;
      background: var(--fourth-color);
      color: var(--fivth-color);
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* Submit button */
    .submit-btn {
      display: block;
      width: 100%;
      margin-top: 1.75rem;
      padding: 0.85rem 1.5rem;
      background: var(--main-color);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    .submit-btn:hover { background: var(--second-color); }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status messages */
    .status {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.88rem;
    }

    .status.loading {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #fdf6ee;
      color: var(--third-color);
    }

    .status.error {
      display: block;
      background: #fff0f0;
      color: #c00;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--fourth-color);
      border-top-color: var(--main-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">PCR Verum</div>
    <h1>Formateador de Comunicados</h1>
    <p class="subtitle">
      Sube el comunicado de prensa original y obtén la versión lisa lista para publicar.
    </p>

    <form id="uploadForm">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" name="file" accept=".docx" />
        <span class="drop-icon">📄</span>
        <div class="drop-label"><strong>Elige un archivo</strong> o arrástralo aquí</div>
        <div class="drop-hint">.docx — máximo 16 MB</div>
      </div>

      <div class="file-selected" id="fileSelected">
        <span class="file-icon">📝</span>
        <div class="file-info">
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
        </div>
        <button type="button" class="remove-btn" id="removeFile" title="Quitar archivo">✕</button>
      </div>

      <div class="options">
        <div class="options-label">Salidas</div>
        <div class="option-row">
          <input type="checkbox" id="optPlain" checked />
          <label for="optPlain">Versión lisa (.docx)</label>
        </div>
        <div class="option-row">
          <input type="checkbox" id="optPdf" />
          <label for="optPdf">PDF</label>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn" disabled>
        Generar
      </button>
    </form>

    <div class="status loading" id="statusLoading">
      <div class="spinner"></div>
      Procesando comunicado…
    </div>
    <div class="status error" id="statusError"></div>
  </div>

  <script>
    const fileInput    = document.getElementById('fileInput');
    const dropZone     = document.getElementById('dropZone');
    const fileSelected = document.getElementById('fileSelected');
    const fileNameEl   = document.getElementById('fileName');
    const fileSizeEl   = document.getElementById('fileSize');
    const removeBtn    = document.getElementById('removeFile');
    const submitBtn    = document.getElementById('submitBtn');
    const optPlain     = document.getElementById('optPlain');
    const optPdf       = document.getElementById('optPdf');
    const form         = document.getElementById('uploadForm');
    const statusLoad   = document.getElementById('statusLoading');
    const statusErr    = document.getElementById('statusError');

    // Require at least one output to be selected
    [optPlain, optPdf].forEach(cb => cb.addEventListener('change', () => {
      if (!optPlain.checked && !optPdf.checked) cb.checked = true;
    }));

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function setFile(file) {
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatBytes(file.size);
      fileSelected.classList.add('visible');
      submitBtn.disabled = false;
      statusErr.style.display = 'none';
    }

    function clearFile() {
      fileInput.value = '';
      fileSelected.classList.remove('visible');
      submitBtn.disabled = true;
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', clearFile);

    // Drag-and-drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.name.toLowerCase().endsWith('.docx')) {
        // Transfer to the input so FormData picks it up
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        setFile(file);
      } else {
        statusErr.textContent = 'Solo se aceptan archivos .docx';
        statusErr.style.display = 'block';
      }
    });

    // Form submit
    form.addEventListener('submit', async e => {
      e.preventDefault();
      if (!fileInput.files[0]) return;

      submitBtn.disabled = true;
      statusLoad.style.display = 'flex';
      statusErr.style.display = 'none';

      // Build the list of requests to make
      const requests = [];
      if (optPlain.checked) requests.push({ plain: 'true',  pdf: 'false', fallback: 'comunicado_plain.docx' });
      if (optPdf.checked)   requests.push({ plain: 'false', pdf: 'true',  fallback: 'comunicado.pdf' });

      try {
        for (const opts of requests) {
          const formData = new FormData();
          formData.append('file', fileInput.files[0]);
          formData.append('plain', opts.plain);
          formData.append('pdf',   opts.pdf);

          const res = await fetch('/process', { method: 'POST', body: formData });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || `Error ${res.status}`);
          }

          const blob = await res.blob();
          const disposition = res.headers.get('Content-Disposition') || '';
          const match = disposition.match(/filename[^;=\n]*=(?:(\\?['"])(.*?)\1|(?:[^\s]+'.*?')?([^;\n]*))/);
          const filename = (match && (match[2] || match[3])) || opts.fallback;

          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        }
      } catch (err) {
        statusErr.textContent = err.message;
        statusErr.style.display = 'block';
      } finally {
        statusLoad.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
